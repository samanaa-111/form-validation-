<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
</head>
   <link rel="stylesheet" href="form.css">
<body>
    <form class="signup" id="Signupform">
        <label for="">Signup</label>
        <fieldset>
            <legend>username</legend>
            <input type="text"placeholder="Enter your username" id="username">
        </fieldset>
        <fieldset>
            <legend>Email</legend>
            <input type="email"placeholder="Enter your name" id="email">
        </fieldset>
        <fieldset>
           <legend>Phonenumber</legend>
        <input type="number"placeholder="Enter your phonenumber" id="pnumber">
        </fieldset>
        <fieldset>
            <legend>Password</legend>
            <input type="password"placeholder="Enter your password" id="password">
        </fieldset>
        <fieldset>
            <legend>Confirm password</legend>
            <input type="password"placeholder="Retype your password" id="cpassword">
        </fieldset>
       
        <button>Signup</button>
        <span id="errormessage"></span>
    </form>
</body>
<script src="script.js"></script>
</html>
